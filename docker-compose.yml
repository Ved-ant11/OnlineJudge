version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oj
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./oj-backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/oj
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}

  worker:
    build: ./oj-backend
    command: npm run worker
    depends_on:
      - postgres
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock     
    environment:
      # same env vars as backend
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/oj
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}

  frontend:
    depends_on:
      - backend
    build: ./oj-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api
      API_BASE_URL: http://backend:5000/api

volumes:
  pgdata:
